apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-agent
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: jenkins-project
  source:
    repoURL: https://github.com/priyanshu3103/dev-argocd.git
    targetRevision: HEAD
    path: charts/jenkins-agent
    helm:
      releaseName: jenkins-agent
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true