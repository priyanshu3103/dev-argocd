# ============ ARGOCD CM ============
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  url: https://localhost:30090
  timeout.reconciliation: 10s
  dex.config: |
    connectors:
      - type: github
        id: github
        name: GitHub
        config:
          clientID: Ov23limd3PFv9mcPHlaY
          clientSecret: 3a94802f87d9b53a6e793387d6278dfed7094e56
          loadAllGroups: false
          useLoginAsID: true
          redirectURI: https://localhost:30090/api/dex/callback

---
# ============ ARGOCD CMD PARAMS CM ============
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
data:
  server.dex.server.disable.tls: "true"
  reposerver.parallelism.limit: "10"

---
# ============ ARGOCD RBAC CM ============
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  policy.default: role:readonly
  policy.csv: |
    p, role:admin, applications, *, */*, allow
    p, role:admin, clusters, *, *, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, projects, *, *, allow
    p, role:admin, accounts, *, *, allow
    p, role:admin, gpgkeys, *, *, allow
    g, priyanshu3103, role:admin
  scopes: '[groups, email]'