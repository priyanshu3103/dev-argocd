{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-agent-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: jenkins-agent-frontend
spec:
  revisionHistoryLimit: {{ .Values.frontend.revisionHistoryLimit }}
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: jenkins-agent-frontend
  template:
    metadata:
      labels:
        app: jenkins-agent-frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          ports:
            - containerPort: {{ .Values.frontend.port }}
          envFrom:                          # ← add here
            - configMapRef:
                name: jenkins-agent-config
          resources:
            requests:
              cpu: {{ .Values.frontend.resources.requests.cpu }}
              memory: {{ .Values.frontend.resources.requests.memory }}
            limits:
              cpu: {{ .Values.frontend.resources.limits.cpu }}
              memory: {{ .Values.frontend.resources.limits.memory }}
      volumes:
        - name: nginx-config
          configMap:
            name: jenkins-agent-nginx-config
{{- end }}

---
{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-agent-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: jenkins-agent-backend
spec:
  revisionHistoryLimit: {{ .Values.backend.revisionHistoryLimit }}
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: jenkins-agent-backend
  template:
    metadata:
      labels:
        app: jenkins-agent-backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          envFrom:                          # ← add here too
            - configMapRef:
                name: jenkins-agent-config
            - secretRef:
                name: jenkins-agent-secrets    # ← inject secrets as env vars

          resources:
            requests:
              cpu: {{ .Values.backend.resources.requests.cpu }}
              memory: {{ .Values.backend.resources.requests.memory }}
            limits:
              cpu: {{ .Values.backend.resources.limits.cpu }}
              memory: {{ .Values.backend.resources.limits.memory }}
{{- end }}