{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-agent-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: jenkins-agent-frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: jenkins-agent-frontend
  template:
    metadata:
      labels:
        app: jenkins-agent-frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          envFrom:
            - configMapRef:
              name: jenkins-agent-config
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf    # ← must match key in configmap
              readOnly: true
          resources:
            requests:
              cpu: {{ .Values.frontend.resources.requests.cpu }}
              memory: {{ .Values.frontend.resources.requests.memory }}
            limits:
              cpu: {{ .Values.frontend.resources.limits.cpu }}
              memory: {{ .Values.frontend.resources.limits.memory }}
      volumes:
        - name: nginx-config
          configMap:
            name: jenkins-agent-config
            items:                          # ← add items
              - key: default.conf           # ← key in configmap
                path: default.conf          # ← filename to mount as
{{- end }}

---
{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-agent-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: jenkins-agent-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: jenkins-agent-backend
  template:
    metadata:
      labels:
        app: jenkins-agent-backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          envFrom:                          # ← add here too
            - configMapRef:
                name: jenkins-agent-config
          resources:
            requests:
              cpu: {{ .Values.backend.resources.requests.cpu }}
              memory: {{ .Values.backend.resources.requests.memory }}
            limits:
              cpu: {{ .Values.backend.resources.limits.cpu }}
              memory: {{ .Values.backend.resources.limits.memory }}
{{- end }}