apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-agent-config
  namespace: {{ .Values.namespace }}
data:
  FRONTEND_URL: "http://jenkins-agent-frontend:{{ .Values.frontend.port }}"
  BACKEND_URL: "http://jenkins-agent-backend:{{ .Values.backend.port }}"
  JENKINS_URL: "http://jenkins:8080"    # ← internal k8s DNS
  #GEMINI_MODEL: "gemini-1.5-flash-latest"
---

# ============ NGINX CONFIG ============
apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-agent-nginx-config
  namespace: {{ .Values.namespace }}
data:
  default.conf: |
    upstream backend {
        server jenkins-agent-backend:{{ .Values.backend.port }};
    }

    server {
        listen 80;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
          proxy_pass http://backend/;

          rewrite ^/api/(.*) /$1 break;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          proxy_set_header X-Forwarded-Host $host;
          proxy_set_header X-Forwarded-Port $server_port;

          proxy_redirect off;
          proxy_buffering off;
        }
    }