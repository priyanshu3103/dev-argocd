frontend:
  enabled: true
  image:
    repository: priyanshu30/jenkins-agent-frontend
    tag: latest # frontend    # ← comment needed for sed to find correct line
    pullPolicy: Always
  port: 80
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

backend:
  enabled: true
  image:
    repository: priyanshu30/jenkins-agent-backend
    tag: latest # backend    # ← comment needed for sed to find correct line
    pullPolicy: Always
  port: 8000
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

namespace: jenkins

config:
  frontendUrl: "http://agent.localhost"
  backendUrl: "http://jenkins-agent-backend:8000"