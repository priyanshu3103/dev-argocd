---
# ============ JENKINS AGENT FRONTEND ============
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jenkins-agent-ingress
  namespace: jenkins
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: agent.localhost
      http:
        paths:

          # 🔥 BACKEND ROUTES FIRST
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: jenkins-agent-backend   # ⚠️ change if needed
                port:
                  number: 8000               # ⚠️ your backend port

          - path: /api
            pathType: Prefix
            backend:
              service:
                name: jenkins-agent-backend
                port:
                  number: 8000

          # 🎯 FRONTEND LAST (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jenkins-agent-frontend
                port:
                  number: 80